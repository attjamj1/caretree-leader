<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Race & Run</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;">

  <div style="text-align:center;margin-bottom:28px;">
    <div style="font-family:var(--font-hand);font-size:36px;color:var(--red);font-style:italic;margin-bottom:6px;">Race & Run!</div>
    <div style="font-size:13px;color:var(--dark-mid);">Create your admin account</div>
  </div>

  <div style="background:#fff;border:1.5px solid var(--tan);border-radius:12px;padding:28px 32px;width:320px;">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="reg-user" placeholder="choose a username" style="width:100%;" onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="reg-pass" placeholder="••••••••" style="width:100%;" onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <div class="form-group">
      <label class="form-label">Confirm password</label>
      <input type="password" id="reg-confirm" placeholder="••••••••" style="width:100%;" onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <div id="reg-error" style="color:var(--red);font-size:11px;margin-bottom:10px;display:none;"></div>
    <div id="reg-success" style="color:var(--green);font-size:11px;margin-bottom:10px;display:none;">Account created! Redirecting...</div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="doRegister()">Create account →</button>
    <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--tan-dark);">
      Already have an account? <a href="/" style="color:var(--red);text-decoration:none;font-weight:600;">Sign in</a>
    </div>
  </div>

  <div style="margin-top:14px;font-size:11px;color:var(--tan-dark);">
    Spectators? <a href="/live" style="color:var(--red);text-decoration:none;font-weight:600;">View live leaderboard ↗</a>
  </div>

  <div style="position:fixed;bottom:0;left:0;right:0;height:6px;background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 8px,var(--blue-stripe) 8px,var(--blue-stripe) 16px);"></div>

<script>
async function doRegister() {
  const username = document.getElementById('reg-user').value.trim();
  const password = document.getElementById('reg-pass').value;
  const confirm  = document.getElementById('reg-confirm').value;
  const errEl    = document.getElementById('reg-error');
  const okEl     = document.getElementById('reg-success');

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!username || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }
  if (password !== confirm)   { errEl.textContent = 'Passwords do not match.';    errEl.style.display = 'block'; return; }
  if (password.length < 6)   { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }

  const res = await fetch('/api/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password }),
  });

  if (res.ok) {
    const { token } = await res.json();
    sessionStorage.setItem('race_api_key', token);
    okEl.style.display = 'block';
    setTimeout(() => window.location.href = '/', 1200);
  } else {
    const data = await res.json();
    errEl.textContent = data.detail || 'Registration failed.';
    errEl.style.display = 'block';
  }
}
</script>
</body>
</html>
